<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <div>
        <h1>Cadastro de Perssonagem</h1> <!--Cadastro de player-->
        <p>Complete suas informações</p>
        <br>
    </div>
    <form> <!--formularios-->
        <fieldset>
            <div>
                <label for="name"></label>
            <input type="text" name="nome" id="nome" placeholder="Digite seu nome">
            <!-- o placeholder eh o texto que aparece embaixo da caixa de texto, antes de vc digitar nada -->
            </div>
            <div>
                <label for="Sobrenome"></label>
            </div>
        </fieldset>
    </form>
</body>
</html>
