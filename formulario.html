<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Sussuros Na Bahia Parte 2</h1>
        <p>Complete suas informações!</p>
        <hr>
    </header>

    <main>
        <form id="cadastroJogador">
            <fieldset>
                <div>
                    <h2>Cadastro de Jogador</h2>
                </div>

                <div>
                    <p>
                        <label for="jogador">jogador:</label>
                        <input type="text" name="jogador" id="jogador" placeholder="Digite o seu nome">
                    </p>
                </div>

                <div>
                    <p>
                        <label for="email">E-mail:</label>
                        <input type="email" name="email" id="email" placeholder="Digite o seu email">
                    </p>
                </div>
            </fieldset>
        </form>

        <form>
            <fieldset>
                <div>
                    <h2>1. Cadastro de Perssonagem</h2>
                </div>

                <div>
                    <p>
                        <label for="nome">Nome:</label>
                        <input type="text" name="nome" id="nome" placeholder="Digite o nome">
                    </p>
                </div>

                <div>
                    <p>
                        <label for="sobrenome">Sobrenome:</label>
                        <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite o sobrenome">
                    </p>
                </div>

                <div>
                    <p>
                        <label for="sexo">Sexo:</label>
                        <input type="radio" name="sexo" id="sexo" value="Masculino">
                        <label for="sexo">Masculino</label>
                        <input type="radio" name="sexo" id="sexo" value="Feminino">
                        <label for="sexo">Feminino</label>
                        <input type="radio" name="sexo" id="sexo" value="Outro">
                        <label for="sexo">Outro</label>
                    </p>
                </div>

                <div>
                    <p>
                        <label for="origem">Origem:</label>
                        <select name="origem" id="origem">
                            <option value="0">Selecione</option>
                            <option value="1">Acadêmico</option>
                            <option value="2">Agente de Saúde</option>
                            <option value="3">Amnésico</option>
                            <option value="4">Artista</option>
                            <option value="5">Atleta</option>
                            <option value="6">Chef</option>
                            <option value="7">Criminoso</option>
                            <option value="8">Cultista Arrependido</option>
                            <option value="9">Desgarrrado</option>
                            <option value="10">Engenheiro</option>
                            <option value="11">Executivo</option>
                            <option value="12">Investigador</option>
                            <option value="13">Lutador</option>
                            <option value="14">Magnata</option>
                            <option value="15">Mercenário</option>
                            <option value="16">Operário</option>
                            <option value="17">Policial</option>
                            <option value="18">Religioso</option>
                            <option value="19">Servidor Público</option>
                            <option value="20">Teórico da Conspiração</option>
                            <option value="21">T.I.</option>
                            <option value="22">Trabalhador Rural</option>
                            <option value="23">Trambiqueiro</option>
                            <option value="24">Universitário</option>
                            <option value="25">Vitima</option>
                        </select>

                </div>

                <div>
                    <p>
                        <label for="nascimento">Data de Nascimento:</label>
                        <input type="date" name="nascimento" id="nascimento">
                    </p>
                </div>

                <h2>2. Informações de Ficha</h2>
                <label for="classe"><strong>Classe do Agente:</strong></label><br>
                <p>
                    <input type="radio" name="combatente" id="combatente" value="Combatente">
                    <label for="combatente">Combatente</label>
                </p>
                <p>
                    <input type="radio" name="especialista" id="especialista" value="Especialista">
                    <label for="especialista">Especialista</label>
                </p>
                <p>
                    <input type="radio" name="ocultista" id="ocultista" value="ocultista">
                    <label for="ocultista">ocultista</label>
                </p>

                <div>
                    <label for="trilha"><strong>Trilha de Classe:</strong></label>
                    <p>
                        <select name="trilhaClasse" id="trilhaClasse">
                            <option value="0">Selecione</option>
                            <option value="1">Aniquilador</option>
                            <option value="2">Tropa de Choque</option>
                            <option value="3">Guerreiro</option>
                            <option value="4">Operações Especiais</option>
                            <option value="5">Médico de Campo</option>
                            <option value="6">Tecnico</option>
                            <option value="7">Infiltrador</option>
                            <option value="8">Negociador</option>
                            <option value="9">Lamina Paranormal</option>
                            <option value="10">Conduite</option>
                            <option value="11">Graduado</option>
                            <option value="12">Intuitivo</option>
                        </select>
                    </p>
                </div><br>
                <div>
                </div>

                <h2>3. Backstory do Personagem</h2>
                <div>
                    <label for="outrolado"><strong>Descreva o momento em que você percebeu que o mundo não era como
                            imaginava:</strong></label>
                    <p><input type="text" name="outrolado" id="outrolado" placeholder="Digite aqui"></p>
                </div>
                <div>
                    <label for="arrependido"><strong>Qual é o seu maior arrependimento?</strong></label>
                    <p><input type="text" name="arrependido" id="arrependido" placeholder="Digite aqui"></p>
                </div>
                <div>
                    <label for="motivo"><strong><strong>O que te motiva a continuar?</strong>
                            <p>
                        </strong><input type="text" name="motivo" id="motivo" placeholder="Digite aqui"></label></p>
                </div>
                <div>
                    <label for="medo" name="medo" id="medo"><strong>Como o Medo te afeta?</strong></label>
                    <p><input type="text" name="medo" id="medo" placeholder="Digite aqui"></p>
                </div>
            </fieldset>
        </form>
    </main>
    <hr>
    <footer><a href="https://github.com/guidorodrigues">Desenvolvido por Guido Rodrigues</a></footer>
</body>

</html>
